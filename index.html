<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore the Events of the Nyingma Mandala</title>
  <style>
    :root {
      --gold: #e3c067;
      --gold-deep: #c79a3a;
      --ink: #eef2ff;
      --muted: #aeb9e6;
      --card: rgba(18, 33, 92, 0.55);
      --header-bg: rgba(227, 192, 103, 0.10);
      --border: rgba(227, 192, 103, 0.22);
      --row-alt: rgba(255, 255, 255, 0.035);
      --field-bg: rgba(8, 18, 60, 0.6);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      line-height: 1.5;
      background:
        radial-gradient(circle at 50% -10%, #2746a8 0%, #16276e 38%, #0a1646 78%, #060f33 100%) fixed;
      min-height: 100vh;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 48px 24px 72px; }
    header { text-align: center; margin-bottom: 8px; }
    header h1 {
      margin: 0 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 600;
      font-size: 2.3rem;
      letter-spacing: 0.02em;
      color: var(--gold);
      text-shadow: 0 1px 12px rgba(227, 192, 103, 0.25);
    }
    header p { margin: 0; color: var(--muted); font-size: 1rem; }
    .controls {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      margin: 32px 0 18px;
    }
    .controls input, .controls select {
      padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.95rem; background: var(--field-bg); color: var(--ink);
    }
    .controls input::placeholder { color: var(--muted); }
    .controls select option { color: #111; }
    .controls input:focus, .controls select:focus { outline: none; border-color: var(--gold); }
    .controls input { flex: 1; min-width: 220px; }
    .controls input[type="checkbox"] { flex: none; min-width: 0; accent-color: var(--gold-deep); }
    .meta { color: var(--gold); font-size: 0.85rem; margin-left: auto; font-weight: 600; }
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.c-org   { width: 20%; }
    col.c-name  { width: 36%; }
    col.c-date  { width: 28%; }
    col.c-link  { width: 16%; }
    th, td { text-align: left; padding: 16px 22px; vertical-align: top; }
    thead th {
      background: var(--header-bg);
      font-size: 0.72rem; text-transform: uppercase;
      letter-spacing: 0.09em; color: var(--gold);
      border-bottom: 1px solid var(--border); font-weight: 700;
    }
    tbody tr { border-bottom: 1px solid rgba(227, 192, 103, 0.12); }
    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(227, 192, 103, 0.07); }
    .org { font-weight: 700; color: #fff; }
    .name { color: var(--ink); }
    .date { color: var(--muted); font-variant-numeric: tabular-nums; }
    td.link { text-align: right; }
    .btn {
      display: inline-block; padding: 8px 18px; border-radius: 999px;
      background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%);
      color: #1a1205; text-decoration: none;
      font-size: 0.85rem; font-weight: 700; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .btn:hover { filter: brightness(1.08); }
    .btn.disabled {
      background: rgba(255, 255, 255, 0.06); color: var(--muted);
      box-shadow: none; pointer-events: none; font-weight: 600;
    }
    .empty { padding: 48px; text-align: center; color: var(--muted); }
    footer { margin-top: 28px; font-size: 0.82rem; color: var(--muted); text-align: center; }
    @media (max-width: 680px) {
      .wrap { padding: 32px 16px 56px; }
      header h1 { font-size: 1.7rem; }
      table, colgroup, col { display: revert; }
      table { table-layout: auto; }
      thead { display: none; }
      table, tbody, tr, td { display: block; width: 100%; }
      tr { padding: 14px 4px; }
      td { padding: 4px 18px; border: none; }
      td.link { text-align: left; padding-top: 8px; }
      td[data-label]::before {
        content: attr(data-label); display: block;
        font-size: 0.68rem; text-transform: uppercase; color: var(--gold); letter-spacing: 0.08em;
        margin-bottom: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Explore the Events of the Nyingma Mandala</h1>
      <p>Upcoming programs across the Institutes, centers, and projects — updated automatically each month.</p>
    </header>

    <div class="controls">
      <input id="search" type="search" placeholder="Search events or organizations…" />
      <select id="orgFilter"><option value="">All organizations</option></select>
      <label style="display:flex;align-items:center;gap:6px;font-size:0.9rem;color:var(--muted);white-space:nowrap;">
        <input id="hidePast" type="checkbox" checked /> Hide past events
      </label>
      <span class="meta" id="meta"></span>
    </div>

    <div class="table-card">
      <table>
        <colgroup>
          <col class="c-org" />
          <col class="c-name" />
          <col class="c-date" />
          <col class="c-link" />
        </colgroup>
        <thead>
          <tr>
            <th>Organization</th>
            <th>Event Name</th>
            <th>Date</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" hidden>No events match your search.</div>
    </div>

    <footer id="footer"></footer>
  </div>

  <script>
    let allEvents = [];

    function render() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const org = document.getElementById("orgFilter").value;
      const hidePast = document.getElementById("hidePast").checked;
      const today = new Date().toISOString().slice(0, 10);
      const tbody = document.getElementById("rows");
      const empty = document.getElementById("empty");

      const filtered = allEvents.filter((e) => {
        const matchesOrg = !org || e.organization === org;
        const hay = (e.event_name + " " + e.organization).toLowerCase();
        // Only hide events we can confidently date in the past. Undated
        // events (no ISO date) are always kept since we can't be sure.
        const isPast = hidePast && e.event_date_iso && e.event_date_iso < today;
        return matchesOrg && !isPast && (!q || hay.includes(q));
      });

      tbody.innerHTML = filtered.map((e) => {
        const hasLink = e.link && /^https?:\/\//.test(e.link);
        const btn = hasLink
          ? `<a class="btn" href="${e.link}" target="_blank" rel="noopener">View Event</a>`
          : `<span class="btn disabled">No link</span>`;
        return `<tr>
          <td data-label="Organization" class="org">${escapeHtml(e.organization)}</td>
          <td data-label="Event Name" class="name">${escapeHtml(e.event_name)}</td>
          <td data-label="Date" class="date">${escapeHtml(e.event_date || "—")}</td>
          <td data-label="Link" class="link">${btn}</td>
        </tr>`;
      }).join("");

      empty.hidden = filtered.length > 0;
      document.getElementById("meta").textContent =
        `${filtered.length} of ${allEvents.length} events`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    async function load() {
      try {
        const res = await fetch("data/events.json?v=" + Date.now());
        const data = await res.json();
        allEvents = data.events || [];

        const orgs = [...new Set(allEvents.map((e) => e.organization))].sort();
        const sel = document.getElementById("orgFilter");
        for (const o of orgs) {
          const opt = document.createElement("option");
          opt.value = o; opt.textContent = o;
          sel.appendChild(opt);
        }

        const when = data.generated_at
          ? new Date(data.generated_at).toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" })
          : "unknown";
        document.getElementById("footer").textContent =
          `Last updated ${when} · ${data.event_count ?? allEvents.length} events from ${data.site_count ?? "?"} sites`;

        render();
      } catch (err) {
        document.getElementById("rows").innerHTML = "";
        document.getElementById("empty").hidden = false;
        document.getElementById("empty").textContent =
          "Could not load events.json yet. Run the scraper or wait for the first scheduled update.";
      }
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("orgFilter").addEventListener("change", render);
    document.getElementById("hidePast").addEventListener("change", render);
    load();
  </script>
</body>
</html>
