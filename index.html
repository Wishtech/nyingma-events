<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore the Events of the Nyingma Mandala</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Nyingma palette */
      --bg-base:    #060D2C;
      --blue-deep:  #0A1338;
      --blue-mid:   #14245F;
      --blue-light: #1D3173;
      --gold-deep:  #A8801F;
      --gold:       #D7AF52;
      --gold-bright:#F0D488;
      --label:      #ECDCA2;
      --cream:      #F5ECCF;
      /* derived */
      --border:     rgba(215, 175, 82, 0.55);
      --divider:    rgba(215, 175, 82, 0.30);
      --field-bg:   rgba(10, 19, 56, 0.66);
      --card-bg:    rgba(20, 36, 95, 0.42);
      --row-alt:    rgba(240, 212, 136, 0.035);
      --inset-hi:   inset 0 1px 0 rgba(240, 212, 136, 0.18);
      --candle-glow:0 0 40px rgba(240, 212, 136, 0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 18px;
      color: var(--cream);
      line-height: 1.55;
      background:
        radial-gradient(ellipse at 50% -8%, #1D3173 0%, #14245F 26%, #0A1338 62%, #060D2C 100%) fixed;
      min-height: 100vh;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 56px 24px 80px; }
    header { text-align: center; margin-bottom: 8px; }
    .eyebrow {
      font-family: "Cinzel", serif; font-weight: 600;
      font-size: 12px; letter-spacing: 0.42em; text-transform: uppercase;
      color: var(--gold); margin: 0 0 16px; padding-left: 0.42em;
    }
    header h1 {
      margin: 0 0 14px;
      font-family: "Cinzel", serif; font-weight: 600; text-transform: uppercase;
      font-size: clamp(28px, 5vw, 44px); letter-spacing: 0.04em;
      color: var(--gold-bright);
      text-shadow: 0 0 26px rgba(240, 212, 136, 0.28);
    }
    header p {
      margin: 0 auto; max-width: 640px;
      font-weight: 500; font-size: 20px; color: var(--label); opacity: 0.85;
    }
    .controls {
      display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
      margin: 40px 0 20px;
    }
    .controls input, .controls select {
      padding: 11px 16px; border: 1.5px solid var(--border); border-radius: 999px;
      font-family: "Cormorant Garamond", Georgia, serif; font-size: 17px;
      background: var(--field-bg); color: var(--cream); box-shadow: var(--inset-hi);
    }
    .controls input::placeholder { color: var(--label); opacity: 0.6; }
    .controls select option { color: #111; }
    .controls input:focus, .controls select:focus { outline: none; border-color: var(--gold-bright); }
    .controls input { flex: 1; min-width: 220px; }
    .check {
      display: flex; align-items: center; gap: 8px; white-space: nowrap;
      font-family: "Cinzel", serif; font-size: 12px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--label);
    }
    .check input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--gold); }
    .meta {
      margin-left: auto; font-family: "Cinzel", serif; font-weight: 600;
      font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-bright);
    }
    .table-card {
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--candle-glow), var(--inset-hi);
      backdrop-filter: blur(7px);
    }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.c-org   { width: 20%; }
    col.c-name  { width: 36%; }
    col.c-date  { width: 28%; }
    col.c-link  { width: 16%; }
    th, td { text-align: left; padding: 17px 24px; vertical-align: top; }
    thead th {
      background: rgba(240, 212, 136, 0.07);
      font-family: "Cinzel", serif; font-weight: 600;
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--gold); border-bottom: 1px solid var(--divider);
    }
    tbody tr { border-bottom: 1px solid rgba(215, 175, 82, 0.16); }
    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(240, 212, 136, 0.06); }
    .org   { font-weight: 600; font-size: 19px; color: var(--gold-bright); }
    .name  { color: var(--cream); font-size: 18px; }
    .date  { color: var(--label); opacity: 0.85; font-variant-numeric: tabular-nums; }
    td.link { text-align: right; }
    .btn {
      display: inline-block; padding: 9px 20px; border-radius: 999px;
      font-family: "Cinzel", serif; font-weight: 600;
      font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
      text-decoration: none; white-space: nowrap;
      color: var(--gold-bright);
      background: linear-gradient(165deg, #243A82 0%, #15235C 50%, #0C1640 100%);
      border: 1px solid var(--border);
      box-shadow: var(--inset-hi);
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .btn:hover { transform: scale(1.05); border-color: var(--gold-bright); }
    /* Fallback link to the org's programs page — outline, no fill, dimmer */
    .btn.alt {
      background: transparent;
      color: var(--gold);
      border: 1px dashed var(--divider);
      box-shadow: none;
    }
    .btn.alt:hover { border-style: solid; border-color: var(--gold-bright); color: var(--gold-bright); }
    .btn.disabled {
      color: var(--label); opacity: 0.45;
      background: rgba(255, 255, 255, 0.04); border-color: var(--divider);
      box-shadow: none; pointer-events: none;
    }
    .empty { padding: 52px; text-align: center; color: var(--label); opacity: 0.8; font-size: 19px; }
    footer {
      margin-top: 32px; text-align: center;
      font-family: "Cinzel", serif; font-size: 11px; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--gold); opacity: 0.7;
    }
    @media (max-width: 680px) {
      .wrap { padding: 36px 16px 60px; }
      /* Stack the controls so nothing overflows on narrow screens */
      .controls { flex-direction: column; align-items: stretch; gap: 12px; margin: 28px 0 18px; }
      .controls input, .controls select { width: 100%; min-width: 0; flex: none; }
      .check { justify-content: flex-start; }
      .meta { margin-left: 0; }

      /* Each event becomes a self-contained card; no repeated field labels */
      table, colgroup, col { display: revert; }
      table { table-layout: auto; }
      thead { display: none; }
      table, tbody, tr, td { display: block; width: 100%; }

      .table-card {
        background: transparent; border: none; box-shadow: none;
        border-radius: 0; overflow: visible; backdrop-filter: none;
      }
      tbody tr {
        background: var(--card-bg);
        border: 1.5px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--candle-glow), var(--inset-hi);
        padding: 16px 18px 18px;
        margin-bottom: 14px;
      }
      tbody tr:nth-child(even) { background: var(--card-bg); }
      tbody tr:hover { background: var(--card-bg); }

      td { padding: 0; border: none; }
      td[data-label]::before { content: none; }            /* drop repeated labels */

      .org {                                                /* organization → eyebrow */
        font-family: "Cinzel", serif; font-weight: 600;
        font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
        color: var(--gold); margin-bottom: 6px;
      }
      .name {                                               /* event name → card title */
        font-size: 20px; line-height: 1.3; font-weight: 600;
        color: var(--gold-bright); margin-bottom: 8px;
      }
      .date {                                               /* date row */
        font-size: 16px; color: var(--label); opacity: 0.85; margin-bottom: 14px;
      }
      td.link {                                             /* divider + button */
        text-align: left; padding-top: 14px;
        border-top: 1px solid var(--divider);
      }
      .btn { padding: 13px 24px; }  /* ~44px tall — comfortable touch target */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Explore the Events of the Nyingma Mandala</h1>
      <p>Upcoming programs across the Institutes, centers, and projects — updated automatically each month.</p>
    </header>

    <div class="controls">
      <input id="search" type="search" placeholder="Search events or organizations…" />
      <select id="orgFilter"><option value="">All organizations</option></select>
      <label class="check">
        <input id="hidePast" type="checkbox" checked /> Hide past events
      </label>
      <span class="meta" id="meta"></span>
    </div>

    <div class="table-card">
      <table>
        <colgroup>
          <col class="c-org" />
          <col class="c-name" />
          <col class="c-date" />
          <col class="c-link" />
        </colgroup>
        <thead>
          <tr>
            <th>Organization</th>
            <th>Event Name</th>
            <th>Date</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" hidden>No events match your search.</div>
    </div>

    <footer id="footer"></footer>
  </div>

  <script>
    let allEvents = [];

    function render() {
      const q = document.getElementById("search").value.trim().toLowerCase();
      const org = document.getElementById("orgFilter").value;
      const hidePast = document.getElementById("hidePast").checked;
      const today = new Date().toISOString().slice(0, 10);
      const tbody = document.getElementById("rows");
      const empty = document.getElementById("empty");

      const filtered = allEvents.filter((e) => {
        const matchesOrg = !org || e.organization === org;
        const hay = (e.event_name + " " + e.organization).toLowerCase();
        // Only hide events we can confidently date in the past. Undated
        // events (no ISO date) are always kept since we can't be sure.
        const isPast = hidePast && e.event_date_iso && e.event_date_iso < today;
        return matchesOrg && !isPast && (!q || hay.includes(q));
      });

      tbody.innerHTML = filtered.map((e) => {
        const hasLink = e.link && /^https?:\/\//.test(e.link);
        const hasSource = e.source_page && /^https?:\/\//.test(e.source_page);
        let btn;
        if (hasLink) {
          // Direct link to the event's own detail page.
          btn = `<a class="btn" href="${escapeHtml(e.link)}" target="_blank" rel="noopener">View Event</a>`;
        } else if (hasSource) {
          // No direct event link found — fall back to the organization's
          // programs page (the page we scraped) with a distinct outline style.
          btn = `<a class="btn alt" href="${escapeHtml(e.source_page)}" target="_blank" rel="noopener"
                    title="No direct event link found — opens this organization's programs page">Visit Site</a>`;
        } else {
          btn = `<span class="btn disabled">No link</span>`;
        }
        return `<tr>
          <td data-label="Organization" class="org">${escapeHtml(e.organization)}</td>
          <td data-label="Event Name" class="name">${escapeHtml(e.event_name)}</td>
          <td data-label="Date" class="date">${escapeHtml(e.event_date || "—")}</td>
          <td data-label="Link" class="link">${btn}</td>
        </tr>`;
      }).join("");

      empty.hidden = filtered.length > 0;
      document.getElementById("meta").textContent =
        `${filtered.length} of ${allEvents.length} events`;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    async function load() {
      try {
        const res = await fetch("data/events.json?v=" + Date.now());
        const data = await res.json();
        allEvents = data.events || [];

        const orgs = [...new Set(allEvents.map((e) => e.organization))].sort();
        const sel = document.getElementById("orgFilter");
        for (const o of orgs) {
          const opt = document.createElement("option");
          opt.value = o; opt.textContent = o;
          sel.appendChild(opt);
        }

        const when = data.generated_at
          ? new Date(data.generated_at).toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" })
          : "unknown";
        document.getElementById("footer").textContent =
          `Last updated ${when} · ${data.event_count ?? allEvents.length} events from ${data.site_count ?? "?"} sites`;

        render();
      } catch (err) {
        document.getElementById("rows").innerHTML = "";
        document.getElementById("empty").hidden = false;
        document.getElementById("empty").textContent =
          "Could not load events.json yet. Run the scraper or wait for the first scheduled update.";
      }
    }

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("orgFilter").addEventListener("change", render);
    document.getElementById("hidePast").addEventListener("change", render);
    load();
  </script>
</body>
</html>
